<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny | Software Engineer</title>
    <!-- Importing Three.js for 3D Physics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* CSS Variables for Theme Toggling */
        :root {
            --bg-color: #f4f4f5;
            --text-color: #18181b;
            --accent-color: #3b82f6;
        }
        [data-theme="dark"] {
            --bg-color: #09090b;
            --text-color: #fafafa;
            --accent-color: #60a5fa;
        }
        
        body {
            margin: 0;
            overflow: hidden; /* Locked until pop */
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        #webgl-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            cursor: pointer;
        }

        /* Portfolio Content Structure */
        #portfolio-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            padding-top: 15vh;
            box-sizing: border-box;
            transition: opacity 2s ease-in;
        }

        #portfolio-content.active {
            opacity: 1;
            pointer-events: all;
        }

        h1 { font-size: 3rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; font-weight: normal; margin-bottom: 3rem; color: var(--accent-color); }
        h3 { border-bottom: 1px solid var(--accent-color); padding-bottom: 0.5rem; }

        section {
            width: 80%;
            max-width: 600px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
            cursor: pointer;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--text-color);
            padding: 8px 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            background: var(--text-color);
            color: var(--bg-color);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()">Toggle Theme</button>

    <div id="webgl-container"></div>

    <main id="portfolio-content">
        <h1>Johnny</h1>
        <h2>Student</h2>
        
        <section id="skills">
            <h3>Skills</h3>
            <p>C++ | Python | C | JavaScript | PHP</p>
        </section>

        <section id="projects">
            <h3>Projects</h3>
            <!-- Add project cards/descriptions here -->
            <p>[ Project details pending implementation ]</p>
        </section>

        <section id="contact">
            <h3>Contact</h3>
            <!-- 
                TODO: Insert Contact Information 
                Email: [Leave Blank for Now]
                GitHub: [Leave Blank for Now]
            -->
        </section>
    </main>

    <script>
        // --- Theme Logic ---
        function toggleTheme() {
            const htmlTag = document.documentElement;
            const isDark = htmlTag.getAttribute('data-theme') === 'dark';
            htmlTag.setAttribute('data-theme', isDark ? 'light' : 'dark');
            // Update particle colors based on theme
            if(particleMaterial) {
                particleMaterial.color.setHex(isDark ? 0x3b82f6 : 0x60a5fa);
            }
        }

        // --- Three.js Physics Engine ---
        let scene, camera, renderer, particles, particleMaterial;
        let isPopped = false;
        let particleVelocities = [];

        function init3D() {
            const container = document.getElementById('webgl-container');
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // Create the Bubble (Sphere of Particles)
            const particleCount = 5000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                // Spherical math for bubble shape
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const radius = 15;

                positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);     // x
                positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta); // y
                positions[i * 3 + 2] = radius * Math.cos(phi);                   // z

                // Store random velocities for the explosion
                particleVelocities.push({
                    x: (Math.random() - 0.5) * 2,
                    y: (Math.random() - 0.5) * 2,
                    z: (Math.random() - 0.5) * 2
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            particleMaterial = new THREE.PointsMaterial({
                color: 0x60a5fa,
                size: 0.3,
                transparent: true,
                opacity: 0.8
            });

            particles = new THREE.Points(geometry, particleMaterial);
            scene.add(particles);

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            container.addEventListener('click', explodeBubble);
            
            animate();
        }

        function explodeBubble() {
            if (isPopped) return;
            isPopped = true;

            // Trigger HTML Reveal
            document.getElementById('portfolio-content').classList.add('active');
            document.body.style.overflow = 'auto'; // Allow scrolling
            document.getElementById('webgl-container').style.cursor = 'default';
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isPopped) {
                // Ambient rotation for the bubble
                particles.rotation.x += 0.002;
                particles.rotation.y += 0.002;
            } else {
                // The Pop Physics (Scattering droplets)
                const positions = particles.geometry.attributes.position.array;
                for (let i = 0; i < positions.length / 3; i++) {
                    // Apply velocity
                    positions[i * 3] += particleVelocities[i].x;
                    positions[i * 3 + 1] += particleVelocities[i].y;
                    positions[i * 3 + 2] += particleVelocities[i].z;
                    
                    // Add slight drag/gravity effect to particles over time
                    particleVelocities[i].y -= 0.01; 
                }
                particles.geometry.attributes.position.needsUpdate = true;
                
                // Fade out particles slowly as they form the background
                if (particleMaterial.opacity > 0.1) {
                    particleMaterial.opacity -= 0.005;
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Boot up the engine
        init3D();
    </script>
</body>
</html>
